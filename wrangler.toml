name = "english-coach-backend"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ─────────────────────────────────────────────────────────
# D1 (SQLite at the edge)
# ─────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "english-coach-db"
database_id = "510c31cd-316e-4688-aa6a-13ae5dcfb6de"
migrations_dir = "migrations"

# ─────────────────────────────────────────────────────────
# KV (key-value cache, sessions)
# ─────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "KV"
id = "e1a800b5737e42abb24ddf69fb7d746d"

# ─────────────────────────────────────────────────────────
# R2 (object storage, audio + exports)
# ─────────────────────────────────────────────────────────
[[r2_buckets]]
binding = "AUDIO"
bucket_name = "english-coach-audio"
preview_bucket_name = "english-coach-audio-dev"

# ─────────────────────────────────────────────────────────
# Queues (background jobs)
# ─────────────────────────────────────────────────────────
[[queues.producers]]
binding = "QUEUE"
queue = "english-coach-jobs"

[[queues.consumers]]
queue = "english-coach-jobs"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3

# ─────────────────────────────────────────────────────────
# Workers AI (free tier — Llama 4 Scout)
# ─────────────────────────────────────────────────────────
[ai]
binding = "AI"

# ─────────────────────────────────────────────────────────
# Secrets (set with `wrangler secret put NAME`)
# ─────────────────────────────────────────────────────────
# JWT_SECRET         — HS256 signing key (already set)
# REFRESH_SECRET     — refresh token signing key (already set)
# APPLE_SHARED_SECRET / STRIPE_SECRET — payment webhooks
# R2_SIGNING_KEY     — presigned URL signing

# ─────────────────────────────────────────────────────────
# Environment vars (non-secret)
# ─────────────────────────────────────────────────────────
[vars]
ENVIRONMENT = "development"
ALLOWED_ORIGIN = "*"
FREE_AI_QUOTA_PER_DAY = "20"
PRO_AI_QUOTA_PER_DAY = "500"
JWT_EXPIRY = "3600"             # 1 hour
REFRESH_EXPIRY = "2592000"      # 30 days
ADMIN_EMAILS = ""               # comma-separated, grants /api/admin/*
STREAK_REMINDER_HOUR = "20"     # 8 PM local
DAILY_CHALLENGE_PUSH_HOUR = "0" # 9 AM Asia (0 UTC) — daily challenge push

# ─────────────────────────────────────────────────────────
# Cron Triggers
# ─────────────────────────────────────────────────────────
[triggers]
crons = [
  "0 0 * * *",       # midnight UTC — daily reset
  "0 1 * * *",       # 9 AM Asia (1 UTC) — daily challenge push
  "0 12 * * *",      # noon UTC — streak reminder
  "0 3 * * 7",       # Sunday 3am UTC — weekly R2 cleanup (7=Sun for Cloudflare)
]
